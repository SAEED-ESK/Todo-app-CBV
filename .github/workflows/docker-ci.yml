name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: saeed
      POSTGRES_USER: saeed
      POSTGRES_PASSWORD: saeed

    steps:
    - uses: actions/checkout@v4
    - name: SetUp Decker Compose
      run: docker compose -f docker-compose-stage.yml up -d --build
    - name: Run Tests
      run: docker exec todo_backend sh -c "pytest ."
